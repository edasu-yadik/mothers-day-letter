<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canım Annem 💖</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="floating-hearts"></div>

  <audio id="bgMusic">
    <source src="music/Candan-Ercetin-Annem.mp3" type="audio/mp3">
  </audio>

  <!-- BAŞLANGIÇ -->
  <section class="hero">

    <div id="envelopeWrapper" class="envelope-wrapper">

      <div class="envelope">

        <div class="top-flap"></div>

        <div class="letter-paper" id="letterPaper">

          <div class="letter-content">
            <h1>Canım Annem 💖</h1>

            <p id="typedText"></p>

            <button id="memoryBtn" class="memory-btn hidden">
              Anılarımız 💕
            </button>

          </div>

        </div>

        <div class="left-flap"></div>
        <div class="right-flap"></div>
        <div class="bottom-flap"></div>

        <button id="openBtn" class="heart-seal">
          💖
          <span>Zarfı Aç</span>
        </button>

      </div>

    </div>

  </section>

  <!-- GALERİ -->
  <section id="gallery" class="gallery hidden">

    <h1>Anılarımız 💕</h1>

    <div class="slideshow">

      <div class="slide-card">

        <img id="slideImage" src="images/photos/photo1.jpg" />

        <p id="slideText">
          En güzel anılarımızdan biri.
        </p>

      </div>

    </div>

    <button id="finalBtn" class="final-btn">
      Final Mesajını Aç 💌
    </button>

  </section>

  <!-- FİNAL -->
  <section id="finalSection" class="final-section hidden">

    <div class="final-box">

      <h1>Seni Çok Seviyorum Anne 💖</h1>

      <p>
        Bu küçük site sadece bir hediye değil...
        Sana olan sevgimin minicik bir parçası.
      </p>

      <p>
        İyi ki benim annemsin.
      </p>

      <h2>🌸 Anneler Günün Kutlu Olsun 🌸</h2>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
